<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRnament v3</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
</head>
<body>
    <video id="video" playsinline></video>
    <canvas id="canvas" width="1024" height="1024"></canvas>
    <div id="scan-line" class="scan-line"></div>
    <div id="flash-layer" class="flash-overlay"></div>

    <div class="controls">
        <input type="text" id="main-input" placeholder="TYPE OR SCAN...">
        <div id="status">READY</div>
        <div class="btn-group">
            <button onclick="App.startCamera()">SCAN</button>
            <button onclick="document.getElementById('file-input').click()">FILE</button>
            <button onclick="App.save()">SAVE</button>
        </div>
        <input type="file" id="file-input" style="display:none" accept="image/*">
    </div>

    <script src="core.js"></script>
</body>
</html>
